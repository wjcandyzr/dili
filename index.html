<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>地理地貌 3D 教学展示</title>
  <link rel="stylesheet" href="./css/style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <header id="topbar">
      <h1>🌏 地理地貌 <span class="accent">3D</span> 展示</h1>
      <div class="topbar-spacer"></div>

      <div class="view-switch" role="tablist">
        <button class="view-btn active" data-view="3d">3D 视图</button>
        <button class="view-btn" data-view="contour">等高线</button>
        <button class="view-btn" data-view="section">剖面图</button>
      </div>

      <label class="toggle-wrap">
        <input type="checkbox" id="toggle-labels" checked />
        显示标注
      </label>

      <label class="toggle-wrap">
        <input type="checkbox" id="auto-rotate" />
        自动旋转
      </label>
    </header>

    <aside id="sidebar">
      <h2>地貌类型</h2>
      <div id="landform-list"></div>
    </aside>

    <main id="canvas-wrap">
      <div id="note-popup"></div>
    </main>

    <section id="info-panel">
      <p style="color:#6a8aac; text-align:center; padding:40px 0;">请在左侧选择地貌</p>
    </section>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
